<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 20px rgba(147, 197, 253, 0.3); border-color: rgba(147, 197, 253, 0.3); }
            50% { box-shadow: 0 0 40px rgba(147, 197, 253, 0.6); border-color: rgba(147, 197, 253, 0.8); }
        }
        
        .cursor::after {
            content: "|";
            animation: blink 1s step-end infinite;
            margin-left: 4px;
            color: #60a5fa;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .scanlines {
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
        }

        ::selection {
            background-color: rgba(147, 197, 253, 0.3);
            color: #ffffff;
        }
    </style>
</head>

        </div>
    </main>

    <script>
        // --- TYPING EFFECT ---
        const text = "Future AI Engineer";
        const target = document.getElementById("typing-text");
        let index = 0;
        function type() {
            if (index < text.length) {
                target.innerHTML += text.charAt(index);
                index++;
                setTimeout(type, 100);
            }
        }

        // --- AUDIO LOGIC ---
        const video = document.getElementById("bgVideo");
        const muteBtn = document.getElementById("muteBtn");
        const muteIcon = document.getElementById("muteIcon");
        const unmuteIcon = document.getElementById("unmuteIcon");

        muteBtn.addEventListener("click", () => {
            if (video.muted) {
                video.muted = false;
                muteIcon.classList.add("hidden");
                unmuteIcon.classList.remove("hidden");
            } else {
                video.muted = true;
                muteIcon.classList.remove("hidden");
                unmuteIcon.classList.add("hidden");
            }
        });

        // Start typing and try to unmute on first click anywhere
        window.onload = () => {
            type();
            // Optional: Unmute automatically on the first click anywhere on the page
            document.body.addEventListener('click', () => {
                // This is a subtle trick to try and "wake up" the audio context
                if(video.muted && unmuteIcon.classList.contains("hidden")) {
                    console.log("Audio ready to be toggled.");
                }
            }, { once: true });
        };
    </script>
</body>
